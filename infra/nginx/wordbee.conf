# Copy to /etc/nginx/sites-available/wordbee and symlink from sites-enabled.
# Adjust server_name and /home/chungy/apps/wordbee if you deploy elsewhere.

server {
    listen 80;
    server_name wordbee.matthewbisbee.com;

    root /home/chungy/apps/wordbee/frontend/dist;
    index index.html;

    client_max_body_size 1m;

    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /maintenance.json {
        try_files /maintenance.json =404;
        add_header Cache-Control "no-store, max-age=0";
    }

    location = /announcement.json {
        try_files /announcement.json =404;
        add_header Cache-Control "no-store, max-age=0";
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store, max-age=0";
    }

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
